name: Sync YouTube Music → Spotify

on:
  schedule:
    # 6:00 AM Colombia (UTC-5) = 14:00 UTC, cada día
    - cron: "0 11 * * *"
  workflow_dispatch:  # Permite ejecución manual desde la app de GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restaurar cache de búsquedas Spotify
        uses: actions/cache@v4
        with:
          path: spotify_search_cache.json
          key: spotify-search-cache

      - name: Run sync
        env:
          # YouTube Music (el JSON ya incluye client_id y client_secret)
          YTMUSIC_AUTH:          ${{ secrets.YTMUSIC_AUTH }}
          # Spotify
          SPOTIFY_CLIENT_ID:     ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REDIRECT_URI:  ${{ secrets.SPOTIFY_REDIRECT_URI }}
          SPOTIFY_CACHE_TOKEN:   ${{ secrets.SPOTIFY_CACHE }}
        run: python sync.py